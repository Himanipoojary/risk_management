version: "3.8"

services:
  # ──────────────────────────────────────────────
  # ERMS API (Backend)
  # ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: erms_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Connect to host machine's local MariaDB (HeidiSQL)
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal;Port=3306;Database=erm_db;Uid=root;Pwd=1978;CharSet=utf8mb4;"
      # CORS — allow the frontend
      Cors__AllowedOrigins__0: "http://localhost:5002"
      Cors__AllowedOrigins__1: "http://web:5002"
      # WebBaseUrl for email links
      WebBaseUrl: "http://localhost:5002"
    networks:
      - erms-net

  # ──────────────────────────────────────────────
  # ERMS Web (Frontend)
  # ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: erms_web
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Backend API URL for server-side calls (container-to-container)
      ApiSettings__BaseUrl: "http://api:5000"
      # Public API URL for browser JavaScript calls (host machine)
      ApiSettings__PublicBaseUrl: "http://localhost:5000"
    depends_on:
      - api
    networks:
      - erms-net

networks:
  erms-net:
    driver: bridge
